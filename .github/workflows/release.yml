name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.24.13'
          check-latest: false
          cache: true
      - name: Verify
        run: |
          go mod verify
          test -z "$(gofmt -l .)"
          go test ./...
          go test -race ./...
          go vet ./...
      - name: Build reproducible release assets
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          COMMIT="$(git rev-parse "$GITHUB_SHA^{commit}")"
          COMMIT_EPOCH="$(git show -s --format=%ct "$COMMIT")"
          BUILD_TIME="$(date -u -d "@$COMMIT_EPOCH" +'%Y-%m-%dT%H:%M:%SZ')"
          export COMMIT BUILD_TIME
          scripts/build-release.sh
          ./dist/dirextalk-updater-linux-amd64 version | grep -F "\"version\": \"$VERSION\""
          ./dist/dirextalk-updater-linux-amd64 version | grep -F "\"commit\": \"$COMMIT\""
          (cd dist && sha256sum --check dirextalk-updater-linux-amd64.sha256)
      - name: Store verified release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets
          path: |
            dist/dirextalk-updater-linux-amd64
            dist/dirextalk-updater-linux-amd64.sha256
            dist/dirextalk-updater-release.json
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  compatibility:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Restore verified release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets
          path: dist
      - name: Smoke test Ubuntu 22.04 compatibility
        run: |
          chmod 0755 dist/dirextalk-updater-linux-amd64
          (cd dist && sha256sum --check dirextalk-updater-linux-amd64.sha256)
          ./dist/dirextalk-updater-linux-amd64 version

  publish:
    needs: [build, compatibility]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Restore verified release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets
          path: dist
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ github.ref_name }}
        run: |
          (cd dist && sha256sum --check dirextalk-updater-linux-amd64.sha256)
          test "$(find dist -maxdepth 1 -type f | wc -l)" -eq 3
          gh release create "$VERSION" \
            dist/dirextalk-updater-linux-amd64 \
            dist/dirextalk-updater-linux-amd64.sha256 \
            dist/dirextalk-updater-release.json \
            --verify-tag --title "$VERSION" --generate-notes
