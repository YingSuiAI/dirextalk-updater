name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true
      - name: Verify module
        run: go mod verify
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Test
        run: go test ./...
      - name: Race test
        run: go test -race ./...
      - name: Vet
        run: go vet ./...
      - name: Build and smoke test
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -o dist/dirextalk-updater-linux-amd64 ./cmd/dirextalk-updater
          ./dist/dirextalk-updater-linux-amd64 version
